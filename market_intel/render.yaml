# Render.com Configuration (FREE TIER - Web Service)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: market-intelligence-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
      - key: MIN_SIGNAL_SCORE
        value: "60"
